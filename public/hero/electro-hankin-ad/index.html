<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חשמל חנקין</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #862421;
    color: #fff;
    font-family: "Heebo", "Assistant", "Rubik", -apple-system, "Segoe UI", Arial, sans-serif;
    direction: rtl;
  }
  .stage { position: fixed; inset: 0; }

  /* Each scene fills the whole panel and centers its content — no letterbox, no dead space */
  .scene {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 5% 7%;
    opacity: 0;
    background: radial-gradient(circle at 50% 38%, #9b2c28 0%, #862421 60%, #6f1d1a 100%);
  }

  .gold { color: #f5c451; }
  .accent-line { width: 38%; height: 3px; border-radius: 3px;
    background: linear-gradient(90deg, transparent, #f5c451, transparent); }

  /* Scene 1 — logo */
  .logo-text { font-weight: 800; font-style: italic; font-size: 13vmin; line-height: 1.05; letter-spacing: -0.5px; }
  .since { margin-top: 4%; font-size: 5.4vmin; font-weight: 600; }
  .tagline { margin-top: 6%; font-size: 4.6vmin; font-weight: 500; opacity: .92; }

  /* Scene 2 — products: vertical auto-scroll marquee (never crams, "more & more products") */
  .scene-2 { justify-content: flex-start; padding-top: 7%; }
  .s-title { font-weight: 800; font-size: 6.2vmin; margin-bottom: 4%; flex: 0 0 auto; }
  .pscroll { position: relative; width: 100%; flex: 1 1 auto; overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 12%, #000 86%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0, #000 12%, #000 86%, transparent 100%); }
  .ptrack { display: grid; grid-template-columns: 1fr 1fr; gap: 3.2vmin;
    will-change: transform; animation: scrollup 18s linear infinite; }
  .thumb { width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden;
    background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.28); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  @keyframes scrollup { from { transform: translateY(0); } to { transform: translateY(-50%); } }

  /* Scene 3 — benefits */
  .benefits { display: flex; flex-direction: column; gap: 5.5%; width: 100%; }
  .benefit { display: flex; align-items: center; gap: 3.5%; font-size: 4.4vmin;
    font-weight: 600; text-align: right; }
  .check { flex: 0 0 auto; width: 7.6vmin; height: 7.6vmin; border-radius: 50%;
    background: #f5c451; color: #862421; font-weight: 900; font-size: 4.4vmin;
    display: flex; align-items: center; justify-content: center; }

  /* Scene 4 — CTA */
  .logo-final { font-weight: 800; font-style: italic; font-size: 9.5vmin; }
  .info { margin-top: 6%; background: rgba(0,0,0,.22); border: 1px solid rgba(245,196,81,.45);
    border-radius: 14px; padding: 5% 6%; width: 100%; }
  .addr { font-size: 4vmin; font-weight: 600; }
  .hours { font-size: 3vmin; opacity: .9; margin-top: 4%; line-height: 1.35; }
  .phone { font-size: 6vmin; font-weight: 800; color: #f5c451; margin-top: 5%; letter-spacing: .5px; }
  .cta { margin-top: 7%; background: #f5c451; color: #862421; font-weight: 800;
    font-size: 5vmin; padding: 3.5% 9%; border-radius: 999px; box-shadow: 0 6px 16px rgba(0,0,0,.3); }

  /* progress bar */
  .progress { position: absolute; bottom: 0; right: 0; height: 4px; background: #f5c451;
    width: 0%; animation: prog 20s linear infinite; }

  /* ---- 20s continuous loop: ALWAYS exactly one scene fully visible (no blank frames). ----
     Each incoming scene reaches opacity:1 (opaque crimson bg) BEFORE the outgoing one
     starts dropping, and scene-1 is visible at the 0%/100% seam — so the crimson strip
     is never empty, and there is no restart flash (pure CSS infinite, no JS clone). */
  .scene-1 { animation: s1 20s linear infinite; }
  .scene-2 { animation: s2 20s linear infinite; }
  .scene-3 { animation: s3 20s linear infinite; }
  .scene-4 { animation: s4 20s linear infinite; }
  @keyframes s1 { 0%{opacity:1} 21%{opacity:1} 25%{opacity:0} 94%{opacity:0} 99%{opacity:1} 100%{opacity:1} }
  @keyframes s2 { 0%{opacity:0} 18%{opacity:0} 22%{opacity:1} 46%{opacity:1} 50%{opacity:0} 100%{opacity:0} }
  @keyframes s3 { 0%{opacity:0} 43%{opacity:0} 47%{opacity:1} 71%{opacity:1} 75%{opacity:0} 100%{opacity:0} }
  @keyframes s4 { 0%{opacity:0} 68%{opacity:0} 72%{opacity:1} 96%{opacity:1} 100%{opacity:0} }
  @keyframes prog { from{width:0%} to{width:100%} }
</style>
</head>
<body>
<div class="stage" id="stage">

  <div class="scene scene-1">

        <!-- set A duplicated for seamless loop -->

        <div class="thumb"><img src="/images/products/37983.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/34717.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/30955.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/36189.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/35091.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/12612.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/13704.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/12169.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/11370.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/10992.jpg" alt=""></div>
        <div class="thumb"><img src="/images/products/12050.jpg" alt=""></div>

  </div>

  <div class="scene scene-3">
    <div class="s-title gold">למה חשמל חנקין?</div>
    <div class="benefits">
      <div class="benefit"><span class="check">✓</span><span>אחריות מלאה על כל מוצר</span></div>
      <div class="benefit"><span class="check">✓</span><span>שירות אישי וחם</span></div>
      <div class="benefit"><span class="check">✓</span><span>מחירים משתלמים</span></div>
      <div class="benefit"><span class="check">✓</span><span>חשמלאי מוסמך בשירות</span></div>
    </div>
  </div>

  <div class="scene scene-4">
    <div class="logo-final">חשמל חנקין</div>
    <div class="info">
      <div class="addr">יהושע חנקין 71, חולון</div>
      <div class="hours">א׳–ה׳ 09:30–14:00 · 16:30–19:30<br>שישי 09:30–14:00</div>
      <div class="phone">03-5562520</div>
    </div>
    <div class="cta">בואו לבקר!</div>

  <div class="progress"></div>
</div>

</body>
